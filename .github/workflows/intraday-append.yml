name: Append intraday price every 5 minutes

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  append-intraday:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install vnstock vnstock-data || true

      - name: Run intraday append
        run: |
          python src/update_intraday_snapshots.py

      - name: Show changed files
        run: |
          git status
          ls -R data || true

      - name: Commit and push updated intraday data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/intraday/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto update intraday snapshots"
            git push origin HEAD:${{ github.ref_name }}
          fi
