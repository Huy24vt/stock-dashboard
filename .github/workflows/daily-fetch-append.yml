name: Daily fetch and append 1D prices

on:
  schedule:
    # 15:10 giờ Việt Nam = 08:10 UTC, chạy Thứ 2 - Thứ 6
    - cron: "10 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-fetch-append-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fetch-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install vnstock || true

      - name: Run daily backfill
        run: |
          python src/backfill_daily.py

      - name: Commit and push updated daily data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/daily/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto update daily stock data"
            git push
          fi
