name: intraday-5m

on:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 9-10 * * 1-5"
      timezone: "Asia/Ho_Chi_Minh"
    - cron: "2,7,12,17,22,27 11 * * 1-5"
      timezone: "Asia/Ho_Chi_Minh"
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 13 * * 1-5"
      timezone: "Asia/Ho_Chi_Minh"
    - cron: "2,7,12,17,22,27,32,37,42 14 * * 1-5"
      timezone: "Asia/Ho_Chi_Minh"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: intraday-5m-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run intraday snapshot update
        run: |
          python src/update_pipeline.py

      - name: Commit updated intraday data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add data/intraday/
          git commit -m "update intraday snapshots" || echo "No changes to commit"
          git push
